name: CD

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/dearday-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "image_tag=$(echo ${{ github.sha }} | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VM_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy prod/ to VM
        run: |
          scp -i ~/.ssh/deploy_key -r prod/* \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/dearday/"

      - name: Write .env on VM
        env:
          PROD_ENV: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV" | ssh -i ~/.ssh/deploy_key \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" \
            'mkdir -p ~/dearday && cat > ~/dearday/.env && chmod 600 ~/dearday/.env'

      - name: Run deploy.sh on VM
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" \
            "IMAGE_TAG='$IMAGE_TAG' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' bash ~/dearday/deploy.sh"
