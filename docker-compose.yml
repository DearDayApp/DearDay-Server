services:
  postgres:
    image: postgres:16-alpine
    container_name: dearday-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dearday
      POSTGRES_PASSWORD: dearday
      POSTGRES_DB: dearday
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dearday -d dearday"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
